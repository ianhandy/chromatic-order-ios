name: ChromaticOrder
options:
  bundleIdPrefix: com.ianhandy
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.3"
settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    INFOPLIST_KEY_UILaunchScreen_Generation: true
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
targets:
  ChromaticOrder:
    type: application
    platform: iOS
    sources:
      - path: ChromaticOrder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ianhandy.chromatic-order
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_CFBundleDisplayName: Chromatic
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: NO
schemes:
  ChromaticOrder:
    build:
      targets:
        ChromaticOrder: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
