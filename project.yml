name: ChromaticOrder
options:
  bundleIdPrefix: com.ianhandy
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.3"
settings:
  base:
    SWIFT_VERSION: "5.9"
    # iPhone-only (family 1). iPad requires all four orientations for
    # multitasking which would force a layout rework — can revisit for
    # a future iPad rev. Apple's upload validator rejects the bundle
    # if iPad is included with portrait-only.
    TARGETED_DEVICE_FAMILY: "1"
    # Apple Developer team (Ian Handy). Kept here so xcodegen preserves
    # it across regenerations — without this it gets reset and archives
    # fail with "Signing requires a development team."
    DEVELOPMENT_TEAM: X5BKD97T2F
    CODE_SIGN_STYLE: Automatic
targets:
  ChromaticOrder:
    type: application
    platform: iOS
    sources:
      - path: ChromaticOrder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ianhandy.kroma
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "9"
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: NO
        CODE_SIGN_ENTITLEMENTS: ChromaticOrder/ChromaticOrder.entitlements
    # Full Info.plist — driven by xcodegen instead of
    # GENERATE_INFOPLIST_FILE because UTExportedTypeDeclarations and
    # CFBundleDocumentTypes are nested arrays of dictionaries that
    # don't fit the flat INFOPLIST_KEY_* setting pattern. Custom UTI
    # (com.ianhandy.kroma.puzzle) registered here, app declared as its
    # owner/handler so tapping a .kroma file opens Kroma.
    info:
      path: ChromaticOrder/Info.plist
      properties:
        CFBundleDevelopmentRegion: $(DEVELOPMENT_LANGUAGE)
        CFBundleDisplayName: Kromatika
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleInfoDictionaryVersion: "6.0"
        CFBundleName: $(PRODUCT_NAME)
        CFBundlePackageType: $(PRODUCT_BUNDLE_PACKAGE_TYPE)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSRequiresIPhoneOS: true
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        # Base orientations list — all four, as Apple's validator
        # demands even on iPhone-only apps. The ~iphone variant
        # overrides at runtime so the app stays portrait-locked.
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~iphone:
          - UIInterfaceOrientationPortrait
        # Pre-answer the "uses non-exempt encryption" question App
        # Store Connect asks on every upload. We don't ship crypto;
        # false here skips the prompt for all subsequent builds.
        ITSAppUsesNonExemptEncryption: false
        # Alternate app icons — iOS uses these when the app calls
        # UIApplication.shared.setAlternateIconName(_:). Each variant's
        # PNGs (@2x/@3x) live at AlternateIcons/<name>{@2x,@3x}.png and
        # get copied to the bundle root via xcodegen's resource pass.
        CFBundleIcons:
          CFBundleAlternateIcons:
            AppIconEasy:
              CFBundleIconFiles: [AppIconEasy]
            AppIconMedium:
              CFBundleIconFiles: [AppIconMedium]
            AppIconHard:
              CFBundleIconFiles: [AppIconHard]
            AppIconExpert:
              CFBundleIconFiles: [AppIconExpert]
        # We accept .kroma files for reading only (no in-place edits).
        # Silences the compile-time warning about file-open semantics.
        LSSupportsOpeningDocumentsInPlace: false
        # Custom document type — Kroma Puzzle (.kroma). Exports as a
        # subtype of public.json so any app that reads JSON can still
        # open one as text, but tapping a .kroma file offers "Open in
        # Kroma" because we own the UTI.
        UTExportedTypeDeclarations:
          - UTTypeIdentifier: com.ianhandy.kroma.puzzle
            UTTypeDescription: Kroma Puzzle
            UTTypeConformsTo:
              - public.json
            UTTypeTagSpecification:
              public.filename-extension:
                - kroma
              public.mime-type:
                - application/vnd.kroma.puzzle+json
        CFBundleDocumentTypes:
          - CFBundleTypeName: Kroma Puzzle
            LSHandlerRank: Owner
            LSItemContentTypes:
              - com.ianhandy.kroma.puzzle
            CFBundleTypeRole: Viewer
        # Custom URL scheme — `kroma://play?data=<base64-url-json>`
        # opens the app and loads the embedded puzzle. Lets a shared
        # link (in Messages, Slack, etc.) drop the recipient straight
        # into the puzzle without needing to tap through a file
        # attachment. Encoded inline so no server is required.
        CFBundleURLTypes:
          - CFBundleURLName: com.ianhandy.kroma.url
            CFBundleTypeRole: Viewer
            CFBundleURLSchemes:
              - kroma
schemes:
  ChromaticOrder:
    build:
      targets:
        ChromaticOrder: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
