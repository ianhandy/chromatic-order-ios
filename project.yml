name: ChromaticOrder
options:
  bundleIdPrefix: com.ianhandy
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.3"
settings:
  base:
    SWIFT_VERSION: "5.9"
    # iPhone-only (family 1). iPad requires all four orientations for
    # multitasking which would force a layout rework — can revisit for
    # a future iPad rev. Apple's upload validator rejects the bundle
    # if iPad is included with portrait-only.
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_KEY_UILaunchScreen_Generation: true
    # Universal orientations key (no ~iphone variant) — Apple's upload
    # validator won't accept a bundle whose Info.plist only has the
    # device-specific UISupportedInterfaceOrientations~iphone. Providing
    # the base key + iPhone-only TARGETED_DEVICE_FAMILY satisfies both.
    INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
    # Apple Developer team (Ian Handy). Kept here so xcodegen
    # preserves it across regenerations — without this it gets reset
    # and archives fail with "Signing requires a development team."
    DEVELOPMENT_TEAM: X5BKD97T2F
    CODE_SIGN_STYLE: Automatic
targets:
  ChromaticOrder:
    type: application
    platform: iOS
    sources:
      - path: ChromaticOrder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ianhandy.kroma
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_CFBundleDisplayName: Kroma
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "3"
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: NO
schemes:
  ChromaticOrder:
    build:
      targets:
        ChromaticOrder: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
